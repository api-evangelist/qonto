description: >-
  FinOps view of Qonto spend. Qonto bills a fixed monthly subscription per business
  account (Basic/Smart/Premium for solo; Essential/Business/Enterprise for teams),
  priced in EUR excluding VAT. On top of the subscription, usage-based fees can
  apply to actions beyond plan allowances - additional SEPA transfers, extra
  physical/virtual cards, instant transfers, cash deposits, and international/FX
  transfers (with an exchange-rate margin). The API itself is not separately
  metered; it is included with the plan.
notes: >-
  Subscription prices confirmed from the Qonto pricing page 2026-07-17. Per-action
  fees and allowances vary by plan and country market; reconcile against the live
  pricing page.
sources:
- https://qonto.com/en/pricing
- https://docs.qonto.com/get-started/business-api/overview
