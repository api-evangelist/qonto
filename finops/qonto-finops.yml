meters:
- name: monthly_subscription
  description: Fixed monthly plan fee per business account, in EUR excl. VAT.
  unit: months
  aggregation: sum
  dimensions:
  - organization
  - plan
- name: additional_sepa_transfers
  description: SEPA transfers beyond the plan's monthly included allowance.
  unit: transfers
  aggregation: sum
  dimensions:
  - organization
  - bank_account
- name: instant_transfers
  description: SEPA instant transfers, which may carry a per-transfer fee.
  unit: transfers
  aggregation: sum
  dimensions:
  - organization
- name: international_transfers
  description: Non-EUR / cross-border transfers billed with an FX exchange-rate margin.
  unit: transfers
  aggregation: sum
  dimensions:
  - organization
  - currency
- name: additional_cards
  description: Extra physical or virtual cards beyond the plan allowance.
  unit: cards
  aggregation: sum
  dimensions:
  - organization
  - card_type
- name: cash_deposits
  description: Cash deposit operations, billed per deposit / as a percentage.
  unit: deposits
  aggregation: sum
  dimensions:
  - organization
principles:
- name: Visibility
  description: Track subscription tier plus per-action fees; export statements via the Statements API.
- name: Allocation
  description: Tag transactions with labels and teams; assign cash flow categories for cost-center mapping.
- name: Optimization
  description: >-
    Right-size the plan to transfer/card volume; batch payouts with bulk transfers;
    prefer SEPA over international/FX where possible; use webhooks instead of polling
    to stay within per-IP rate limits.
- name: Accountability
  description: Assign an owner per organization/API app; review monthly subscription + usage fees against budget.
