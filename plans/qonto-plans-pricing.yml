created: '2026-07-17'
modified: '2026-07-17'
reconciled: true
tags:
- Business Banking
- Fintech
- Payments
- Plans
currency: EUR
description: >-
  Qonto monetizes via monthly business-account subscription plans (priced in EUR,
  excluding VAT), not via metered API pricing. API access and integrations are
  included across all plans - the Business API and OAuth apps let customers connect
  Qonto to third-party tools. Freelancer/solo plans are Basic, Smart, and Premium;
  company/team plans are Essential, Business, and Enterprise. Individual actions
  (extra SEPA transfers beyond plan allowance, cards, cash deposits, instant
  transfers, international/FX transfers) may carry per-use fees on top of the
  subscription.
notes: >-
  Prices confirmed from the Qonto pricing page on 2026-07-17 (EUR, excl. VAT) and
  vary by country market. Verify current allowances and per-action fees on the
  live pricing page during reconciliation.
sources:
- https://qonto.com/en/pricing
- https://docs.qonto.com/get-started/business-api/overview
