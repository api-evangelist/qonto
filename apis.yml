aid: qonto
url: https://raw.githubusercontent.com/api-evangelist/qonto/refs/heads/main/apis.yml
name: Qonto
kind: company
description: Qonto is a European business banking / neobank platform for freelancers
  and SMEs, founded in Paris in 2016 and operating on an EU-passported payment institution
  licence. Its Business API and Onboarding API give programmatic access to business
  accounts, EUR transactions, SEPA and international transfers, cards, client and supplier
  invoices, SEPA Direct Debit, payment links, terminals, webhooks, and partner-led
  company onboarding, authenticated by a login+secret-key API key or OAuth 2.0.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Business Banking
- Neobank
- Fintech
- Payments
- SEPA
- Open Banking
- EUR
- Europe
created: '2026-07-17'
modified: '2026-07-17'
